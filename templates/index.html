<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devcontainer Generator</title>
    <style>
        :root {
            --bg-color: #f9f9f9;
            --text-color: #333;
            --container-bg: #fff;
            --input-border: #ccc;
            --input-bg: #fff;
            --input-text: #333;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #e0e0e0;
                --container-bg: #1e1e1e;
                --input-border: #444;
                --input-bg: #2d2d2d;
                --input-text: #e0e0e0;
            }
        }

        body.light-mode {
            --bg-color: #f9f9f9;
            --text-color: #333;
            --container-bg: #fff;
            --input-border: #ccc;
            --input-bg: #fff;
            --input-text: #333;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --container-bg: #1e1e1e;
            --input-border: #444;
            --input-bg: #2d2d2d;
            --input-text: #e0e0e0;
        }

        body { font-family: sans-serif; margin: 2rem; background: var(--bg-color); color: var(--text-color); transition: background 0.3s, color 0.3s; }
        .container { max-width: 800px; margin: 0 auto; background: var(--container-bg); padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: background 0.3s; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        h1 { margin: 0; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: bold; margin-bottom: 0.5rem; }
        input[type="text"], select { width: 100%; padding: 0.5rem; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--input-text); border-radius: 4px; box-sizing: border-box; }
        .modules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.5rem; }
        .module-item { display: flex; align-items: center; }
        .module-item input { margin-right: 0.5rem; }
        .btn { display: inline-block; background: #007bff; color: #fff; padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        .btn:hover { background: #0056b3; }
        pre { background: #2d2d2d; color: #ccc; padding: 1rem; border-radius: 4px; overflow-x: auto; font-family: monospace; white-space: pre-wrap; }
        .output-section { margin-top: 2rem; }
        .output-header { display: flex; justify-content: space-between; align-items: center; }
        .copy-btn { background: #555; color: white; border: none; padding: 0.25rem 0.5rem; border-radius: 4px; cursor: pointer; }
        .copy-btn:hover { background: #777; }
        .theme-btn { background: var(--input-border); color: var(--text-color); }
        .theme-btn:hover { opacity: 0.8; }
        .error { color: red; font-weight: bold; }
        /* Hide outputs initially */
        #output-container { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-top">
        <h1>Devcontainer Generator</h1>
        <button id="theme-toggle" class="btn theme-btn">Toggle Theme</button>
    </div>
    <form id="generator-form">
        <div class="form-group">
            <label for="project-name">Project Name</label>
            <input type="text" id="project-name" name="project_name" required placeholder="e.g. My Project">
        </div>

        <div class="form-group">
            <label for="image-select">Base Image</label>
            <select id="image-select" name="selected_name" required>
                <option value="" disabled selected>Loading...</option>
            </select>
        </div>

        <div class="form-group">
            <label>Modules</label>
            <div class="modules-grid" id="modules-container">
                <!-- Modules will be populated here -->
                <div>Loading...</div>
            </div>
        </div>

        <button type="submit" class="btn">Generate Configuration</button>
        <span id="status-message" style="margin-left: 1rem;"></span>
    </form>

    <div id="output-container" class="output-section">
        <div class="output-header">
            <h2>Dockerfile</h2>
            <button class="copy-btn" onclick="copyText('dockerfile-output', this)">Copy</button>
        </div>
        <pre><code id="dockerfile-output"></code></pre>

        <div class="output-header">
            <h2>devcontainer.json</h2>
            <button class="copy-btn" onclick="copyText('devcontainer-output', this)">Copy</button>
        </div>
        <pre><code id="devcontainer-output"></code></pre>

        <div class="output-header">
            <h2>setup.sh</h2>
            <button class="copy-btn" onclick="copyText('setupscript-output', this)">Copy</button>
        </div>
        <pre><code id="setupscript-output"></code></pre>
    </div>
</div>

<script>
    // Theme toggling logic
    const themeToggleBtn = document.getElementById('theme-toggle');
    const currentTheme = localStorage.getItem('theme');
    
    if (currentTheme) {
        document.body.classList.add(currentTheme);
    }

    themeToggleBtn.addEventListener('click', () => {
        if (document.body.classList.contains('dark-mode')) {
            document.body.classList.remove('dark-mode');
            document.body.classList.add('light-mode');
            localStorage.setItem('theme', 'light-mode');
        } else if (document.body.classList.contains('light-mode')) {
            document.body.classList.remove('light-mode');
            document.body.classList.add('dark-mode');
            localStorage.setItem('theme', 'dark-mode');
        } else {
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.body.classList.add('light-mode');
                localStorage.setItem('theme', 'light-mode');
            } else {
                document.body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark-mode');
            }
        }
    });

    // Fetch options on page load
    fetch('/api/options')
        .then(response => response.json())
        .then(data => {
            // Populate images
            const imageSelect = document.getElementById('image-select');
            imageSelect.innerHTML = '<option value="" disabled>Select an image...</option>';
            data.images.forEach(img => {
                const option = document.createElement('option');
                option.value = img;
                option.textContent = img;
                if (img === 'Ubuntu') {
                    option.selected = true;
                }
                imageSelect.appendChild(option);
            });

            // Populate modules
            const modulesContainer = document.getElementById('modules-container');
            modulesContainer.innerHTML = '';
            data.modules.forEach(mod => {
                const label = document.createElement('label');
                label.className = 'module-item';
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.name = 'selected_modules';
                checkbox.value = mod;
                
                label.appendChild(checkbox);
                label.appendChild(document.createTextNode(mod));
                
                modulesContainer.appendChild(label);
            });
        })
        .catch(err => {
            console.error('Error fetching options:', err);
            document.getElementById('modules-container').innerHTML = '<span class="error">Failed to load options</span>';
        });

    // Handle form submission
    document.getElementById('generator-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const statusMsg = document.getElementById('status-message');
        statusMsg.textContent = 'Generating...';
        statusMsg.className = '';
        
        const projectName = document.getElementById('project-name').value;
        const selectedName = document.getElementById('image-select').value;
        
        // Get all selected checkboxes for modules
        const selectedModules = [];
        document.querySelectorAll('input[name="selected_modules"]:checked').forEach(cb => {
            selectedModules.push(cb.value);
        });

        const payload = {
            project_name: projectName,
            selected_name: selectedName,
            selected_modules: selectedModules
        };

        fetch('/api/generate', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        })
        .then(response => response.json().then(data => ({ status: response.status, body: data })))
        .then(res => {
            if (res.status === 200) {
                document.getElementById('dockerfile-output').textContent = res.body.dockerfile;
                document.getElementById('devcontainer-output').textContent = res.body.devcontainer;
                
                // Show or hide setup script output if empty
                const setupEl = document.getElementById('setupscript-output');
                if (res.body.setupscript && res.body.setupscript.trim().length > 0) {
                    setupEl.textContent = res.body.setupscript;
                    setupEl.parentElement.style.display = 'block';
                    setupEl.parentElement.previousElementSibling.style.display = 'flex';
                } else {
                    setupEl.parentElement.style.display = 'none';
                    setupEl.parentElement.previousElementSibling.style.display = 'none';
                }

                document.getElementById('output-container').style.display = 'block';
                statusMsg.textContent = 'Success!';
                statusMsg.style.color = 'green';
            } else {
                statusMsg.textContent = 'Error: ' + (res.body.error || 'Unknown error');
                statusMsg.className = 'error';
                document.getElementById('output-container').style.display = 'none';
            }
        })
        .catch(err => {
            console.error('Generation flow error:', err);
            statusMsg.textContent = 'Error: Failed to fetch';
            statusMsg.className = 'error';
        });
    });

    // Copy to clipboard helper
    function copyText(elementId, btn) {
        const text = document.getElementById(elementId).textContent;
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => {
                btn.textContent = originalText;
            }, 2000);
        });
    }
</script>

</body>
</html>
